<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>一年级拼音识字小游戏 | 拼音小英雄</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免小朋友拖动文字，但不影响输入框 */
        }

        body {
            background: linear-gradient(145deg, #f9e7b3 0%, #f5c98e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', 'Segoe UI', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 游戏主面板 */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: #fffef7;
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            overflow: hidden;
            padding: 20px 25px 35px;
            text-align: center;
            transition: all 0.2s ease;
        }

        /* 头部信息栏 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #ffefc0;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 4px 8px rgba(0,0,0,0.05);
        }

        .score-box, .timer-box {
            background: white;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
        }

        .score-box span:first-child, .timer-box span:first-child {
            font-size: 1rem;
            color: #b45f2b;
        }

        .score-value, .timer-value {
            font-size: 1.8rem;
            color: #e67e22;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* 汉字展示大卡片 */
        .hanzi-card {
            background: #fff2df;
            border-radius: 70px;
            margin: 15px 0 20px;
            padding: 45px 20px;
            box-shadow: inset 0 0 0 5px white, 0 15px 25px rgba(0, 0, 0, 0.1);
            border: 2px solid #ffcd94;
        }

        .current-hanzi {
            font-size: 8rem;
            font-weight: 800;
            color: #d45a1f;
            text-shadow: 6px 6px 0 #ffdd99;
            letter-spacing: 12px;
            word-break: break-word;
            display: inline-block;
        }

        /* 提示小贴士 */
        .hint-area {
            background: #ffe3b5;
            border-radius: 50px;
            padding: 8px 15px;
            margin: 5px 0 15px;
            font-size: 1rem;
            color: #b45a2b;
            display: inline-block;
        }

        /* 输入区 */
        .input-area {
            margin: 20px 0 15px;
        }

        .pinyin-input {
            width: 85%;
            max-width: 280px;
            padding: 16px 20px;
            font-size: 1.6rem;
            font-family: 'Courier New', 'Segoe UI', monospace;
            text-align: center;
            border: 4px solid #ffbc6e;
            border-radius: 60px;
            background: white;
            outline: none;
            color: #7c3f12;
            font-weight: bold;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .pinyin-input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.3);
            background: #fffbf0;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 15px 0 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #ffbc6e;
            color: #5a2e0e;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #a05e1a;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #a05e1a;
        }

        .btn-primary {
            background: #f3a712;
            color: #2d1b0c;
            box-shadow: 0 5px 0 #c16f1a;
        }

        .btn-reset {
            background: #ff8c5a;
            color: white;
            box-shadow: 0 5px 0 #b6491a;
        }

        /* 反馈消息 */
        .message {
            background: #fff0d0;
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #c75c1c;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .error-msg {
            color: #e84118;
            background: #ffe0db;
        }

        .success-msg {
            color: #2b7a3e;
            background: #e0ffe4;
        }

        .gameover-msg {
            background: #fedba0;
            color: #b6491a;
            font-size: 1.3rem;
        }

        /* 进度条小装饰 */
        .progress-info {
            margin-top: 12px;
            font-size: 1rem;
            background: #f2e2ca;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
            color: #8b4b1a;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 15px 18px 25px;
            }
            .current-hanzi {
                font-size: 5rem;
            }
            .pinyin-input {
                font-size: 1.3rem;
                padding: 12px 16px;
            }
            .score-value, .timer-value {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <div class="score-box">
            <span>📖 进度</span>
            <span class="score-value" id="questionCounter">0</span>
            <span>/20</span>
        </div>
        <div class="timer-box">
            <span>⏱️ 用时</span>
            <span class="timer-value" id="timerDisplay">0.0</span>
            <span>秒</span>
        </div>
    </div>

    <div class="hanzi-card">
        <div class="current-hanzi" id="currentHanzi">?</div>
    </div>

    <div class="hint-area">
        💡 请输入拼音小写字母 (例: "ma", "wo", "shi")
    </div>

    <div class="input-area">
        <input type="text" id="pinyinInput" class="pinyin-input" placeholder="输入拼音..." autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>

    <div class="button-group">
        <button class="btn btn-primary" id="submitBtn">✔️ 检查答案</button>
        <button class="btn btn-reset" id="resetBtn">🔄 重新开始</button>
    </div>

    <div class="message" id="messageArea">
        🧸 输入拼音，答对20个汉字就胜利啦！
    </div>
    <div class="progress-info" id="extraInfo">⭐ 必须答对才能进入下一题 ⭐</div>
</div>

<script>
    // ----------------------------- 内置字库 (汉字 + 小写拼音) -----------------------------
    // 一年级常用字，拼音均为小写，无空格无音调 (标准小写)
    const WORD_BANK = [
        { word: "人", pinyin: "ren" },
        { word: "口", pinyin: "kou" },
        { word: "手", pinyin: "shou" },
        { word: "足", pinyin: "zu" },
        { word: "日", pinyin: "ri" },
        { word: "月", pinyin: "yue" },
        { word: "水", pinyin: "shui" },
        { word: "火", pinyin: "huo" },
        { word: "山", pinyin: "shan" },
        { word: "石", pinyin: "shi" },
        { word: "田", pinyin: "tian" },
        { word: "云", pinyin: "yun" },
        { word: "风", pinyin: "feng" },
        { word: "雨", pinyin: "yu" },
        { word: "电", pinyin: "dian" },
        { word: "木", pinyin: "mu" },
        { word: "林", pinyin: "lin" },
        { word: "天", pinyin: "tian" },
        { word: "地", pinyin: "di" },
        { word: "妈", pinyin: "ma" },
        { word: "爸", pinyin: "ba" },
        { word: "哥", pinyin: "ge" },
        { word: "弟", pinyin: "di" },
        { word: "花", pinyin: "hua" },
        { word: "草", pinyin: "cao" },
        { word: "鸟", pinyin: "niao" },
        { word: "鱼", pinyin: "yu" },
        { word: "虫", pinyin: "chong" },
        { word: "马", pinyin: "ma" },
        { word: "牛", pinyin: "niu" },
        { word: "羊", pinyin: "yang" },
        { word: "米", pinyin: "mi" },
        { word: "大", pinyin: "da" },
        { word: "小", pinyin: "xiao" },
        { word: "多", pinyin: "duo" },
        { word: "少", pinyin: "shao" },
        { word: "上", pinyin: "shang" },
        { word: "下", pinyin: "xia" },
        { word: "来", pinyin: "lai" },
        { word: "去", pinyin: "qu" }
    ];

    // 游戏配置
    const TOTAL_QUESTIONS = 20;      // 一局固定20个汉字
    let currentGameQuestions = [];    // 存储当前20个汉字对象 (随机抽取，但可以重复? 为了丰富，允许随机但尽量不同)
    let currentIndex = 0;             // 当前第几题 (0 ~ 19)
    let gameActive = true;            // 游戏是否活跃 (未结束且未完成)
    let gameCompleted = false;        // 是否完成20题
    let timerSeconds = 0.0;           // 计时秒数
    let timerInterval = null;          // 定时器ID
    let isWaitingForCorrect = false;   // 辅助标志，其实通过gameActive和gameCompleted控制，但用于输入锁定

    // DOM 元素
    const currentHanziEl = document.getElementById('currentHanzi');
    const pinyinInput = document.getElementById('pinyinInput');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const messageArea = document.getElementById('messageArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const extraInfoDiv = document.getElementById('extraInfo');

    // ---------- 辅助函数 ----------
    // 从字库中随机抽取不重复(尽量)的20个汉字，如果字库数量大于等于20则随机取20个不同字，否则允许重复(但我们的字库有40个 >20)
    function generateRandomQuestions() {
        // 为了避免每局题目太相似，但是保证随机性，深拷贝字库数组然后随机排序取前20
        const shuffled = [...WORD_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, TOTAL_QUESTIONS);
    }

    // 停止计时器
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    // 开始计时 (重置旧计时)
    function startTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
        }
        timerInterval = setInterval(() => {
            // 只有在游戏未完成且未结束(并且游戏活跃，没有完成)时才增加时间
            if (!gameCompleted && gameActive) {
                timerSeconds += 0.1;
                timerDisplaySpan.textContent = timerSeconds.toFixed(1);
            } else if (gameCompleted) {
                // 如果游戏完成了，不再累加，但是已经停止计时，实际上应该已经clear，但额外保险
                // 但不要累加，但也不做什么
            }
        }, 100);
    }

    // 重置所有游戏状态 (开始新游戏)
    function resetAndNewGame() {
        // 停止旧计时
        stopTimer();
        // 重置标志
        gameCompleted = false;
        gameActive = true;
        isWaitingForCorrect = false;
        // 重置计时数值
        timerSeconds = 0.0;
        timerDisplaySpan.textContent = "0.0";
        // 生成全新的20个题目 (随机)
        currentGameQuestions = generateRandomQuestions();
        currentIndex = 0;
        // 刷新界面显示第一题
        updateDisplayForCurrentQuestion();
        // 更新计数器
        updateQuestionCounter();
        // 清空输入框和消息
        clearInputAndMessage();
        // 启用输入框 (如果完成时禁用过，现在启用)
        pinyinInput.disabled = false;
        submitBtn.disabled = false;
        pinyinInput.focus();
        // 开始计时
        startTimer();
        // 额外状态消息
        setMessage("🎉 新的一局！一共20题，加油哟！", "success-msg");
    }

    // 清除输入框和普通消息样式
    function clearInputAndMessage() {
        pinyinInput.value = '';
        // 重置消息样式但不覆盖重要消息
        messageArea.className = 'message';
    }

    // 设置消息内容及样式类
    function setMessage(msg, className = '') {
        messageArea.innerHTML = msg;
        messageArea.className = 'message';
        if (className) {
            messageArea.classList.add(className);
        }
    }

    // 显示错误提示 (必须答对)
    function showWrongMessage(expectedPinyin, userInput) {
        setMessage(`❌ 拼音“${userInput}”不正确！ 正确答案是“${expectedPinyin}”，再试试看～`, 'error-msg');
        // 错误时震动输入框小效果 (视觉提示)
        pinyinInput.style.transform = 'shake 0.2s ease-in-out 0s 2';
        setTimeout(() => { pinyinInput.style.transform = ''; }, 400);
        // 添加简单抖动动画 (如果没有定义，就临时加)
        if (!document.querySelector('#shakeKeyframe')) {
            const style = document.createElement('style');
            style.id = 'shakeKeyframe';
            style.textContent = `@keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } } .shake-input { animation: shake 0.2s ease-in-out 0s 2; }`;
            document.head.appendChild(style);
        }
        pinyinInput.classList.add('shake-input');
        setTimeout(() => pinyinInput.classList.remove('shake-input'), 400);
    }

    // 显示正确信息，并准备进入下一题
    function handleCorrect() {
        // 正确后，当前索引加1
        const isLast = (currentIndex + 1 === TOTAL_QUESTIONS);
        // 正确动画消息
        setMessage(`✅ 完全正确！ “${currentGameQuestions[currentIndex].word}” 的拼音很棒！`, 'success-msg');

        if (!isLast) {
            // 不是最后一题，移动到下一题
            currentIndex++;
            updateDisplayForCurrentQuestion();
            updateQuestionCounter();
            // 清空输入框
            pinyinInput.value = '';
            // 聚焦输入框
            pinyinInput.focus();
            setMessage(`🎈 进入下一题！ 还剩 ${TOTAL_QUESTIONS - currentIndex} 题`, 'success-msg');
            // 保证游戏active标志依然是true (未完成)
            gameActive = true;
            gameCompleted = false;
        } else {
            // 最后一题并且回答正确: 游戏结束，完成20题
            gameCompleted = true;
            gameActive = false;   // 游戏结束不再接收答题
            // 停止计时
            stopTimer();
            // 禁用输入和提交按钮
            pinyinInput.disabled = true;
            submitBtn.disabled = true;
            // 显示华丽完成界面
            const totalTime = timerSeconds.toFixed(1);
            setMessage(`🏆 恭喜你完成了全部20个汉字！ 🏆<br> ⏱️ 总用时 ${totalTime} 秒！ 你真是拼音小英雄！ 🎉`, 'gameover-msg');
            extraInfoDiv.innerHTML = '🎯 游戏通关！点击【重新开始】可以再玩一局 🎯';
            // 额外更新进度显示完整
            updateQuestionCounter(); // 显示20/20
            // 让输入框失去焦点
            pinyinInput.blur();
            return;
        }
    }

    // 更新显示当前汉字和界面辅助
    function updateDisplayForCurrentQuestion() {
        if (currentGameQuestions && currentIndex < currentGameQuestions.length) {
            const current = currentGameQuestions[currentIndex];
            currentHanziEl.textContent = current.word;
        } else {
            currentHanziEl.textContent = "？";
        }
        // 每次更新题目后清空输入框内残留
        if (pinyinInput) pinyinInput.value = '';
        // 确保输入框可用(未完成时)
        if (!gameCompleted && gameActive) {
            pinyinInput.disabled = false;
            submitBtn.disabled = false;
        } else if (gameCompleted) {
            pinyinInput.disabled = true;
            submitBtn.disabled = true;
        }
    }

    // 更新计数器显示 (当前第几题/共20)
    function updateQuestionCounter() {
        if (!gameCompleted) {
            questionCounterSpan.textContent = `${currentIndex}`;
        } else {
            questionCounterSpan.textContent = `${TOTAL_QUESTIONS}`;
        }
    }

    // 校验用户输入的拼音 (核心逻辑)
    function checkAnswer() {
        // 如果游戏已经完成或者游戏未激活（完成或者等待重置过程中不允许答题）
        if (gameCompleted) {
            setMessage("🏁 游戏已经完成啦！点击「重新开始」继续挑战吧", 'error-msg');
            return;
        }
        if (!gameActive) {
            // 以防万一 但gameActive与gameCompleted联动，可以重置
            if (!gameCompleted) gameActive = true;
            else return;
        }
        // 获取当前汉字对象
        if (currentIndex >= TOTAL_QUESTIONS) {
            // 容错: 不应该发生
            if (!gameCompleted) {
                // 异常情况强制完成
                gameCompleted = true;
                stopTimer();
                setMessage("🎉 神奇的力量！已完成所有题目！", 'gameover-msg');
                pinyinInput.disabled = true;
                submitBtn.disabled = true;
            }
            return;
        }
        const currentItem = currentGameQuestions[currentIndex];
        const correctPinyin = currentItem.pinyin.toLowerCase().trim();
        let userPinyin = pinyinInput.value.trim().toLowerCase();

        // 简单过滤空格及特殊字符，只允许小写字母组合
        // 一年级小朋友可能不小心输入空格或者大写，处理一下
        userPinyin = userPinyin.replace(/\s/g, '');

        if (userPinyin === "") {
            setMessage("🐣 在框里输入拼音吧！试试看～", 'error-msg');
            pinyinInput.focus();
            return;
        }

        // 严格匹配拼音 (完全相等)
        if (userPinyin === correctPinyin) {
            // 回答正确，进入处理
            handleCorrect();
        } else {
            // 回答错误，给出提示，不清空输入框，保留输入让小朋友修改，不切换汉字
            showWrongMessage(correctPinyin, userPinyin);
            pinyinInput.focus();
            // 高亮输入框提醒错误
            pinyinInput.select();
        }
    }

    // 监听键盘提交 (回车)
    function onEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!gameCompleted && gameActive) {
                checkAnswer();
            } else if (gameCompleted) {
                setMessage("游戏已经完成，按「重新开始」继续游戏吧", 'error-msg');
            }
        }
    }

    // 页面初始化 & 事件绑定
    function initGame() {
        // 生成随机题目并启动
        resetAndNewGame(); // 包含startTimer和生成题目
        // 绑定事件
        submitBtn.addEventListener('click', () => {
            if (!gameCompleted && gameActive) {
                checkAnswer();
            } else if (gameCompleted) {
                setMessage("🎮 游戏已完成，点击重新开始再玩一局", 'error-msg');
            } else {
                // 如果因为其他原因，重置后可用
                checkAnswer();
            }
        });
        resetBtn.addEventListener('click', () => {
            resetAndNewGame();
        });
        pinyinInput.addEventListener('keypress', onEnterKey);
        // 额外: 点击重置后焦点自动在输入框
        pinyinInput.addEventListener('focus', () => {
            if (!gameCompleted && gameActive) {
                // 正常
            }
        });
    }

    // 启动游戏
    initGame();
</script>
</body>
</html>
