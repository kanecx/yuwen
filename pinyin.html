<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼音小英雄 | 极简识字游戏</title>
    <style>
* {
    box-sizing: border-box;
    user-select: none;
}

body {
    background: linear-gradient(145deg, #f9e7b3 0%, #f5c98e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
    margin: 0;
    padding: 16px 12px 20px;
}

.game-full {
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: transparent;
}

.game-container {
    background: #fffef7;
    border-radius: 70px 70px 60px 60px;
    box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
    padding: 20px 20px 30px;
    text-align: center;
    transition: all 0.2s ease;
}

.game-header {
    display: flex;
    justify-content: space-around;
    background: #ffefc0;
    padding: 8px 12px;
    border-radius: 60px;
    margin-bottom: 20px;
    flex-wrap: nowrap;
    gap: 8px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 4px 8px rgba(0,0,0,0.05);
}

.score-box, .timer-box {
    background: white;
    border-radius: 40px;
    padding: 6px 14px;
    font-weight: bold;
    font-size: 1.1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: flex;
    align-items: baseline;
    gap: 4px;
    flex: 1;
    justify-content: center;
    white-space: nowrap;
}

.score-box span:first-child, .timer-box span:first-child {
    font-size: 0.85rem;
    the color: #b45f2b;
}

.score-value, .timer-value {
    font-size: 1.5rem;
    color: #e67e22;
    font-weight: bold;
    font-family: monospace;
}

.hanzi-card {
    background: #fff2df;
    border-radius: 65px;
    margin: 8px 0 15px;
    padding: 30px 15px;
    box-shadow: inset 0 0 0 5px white, 0 12px 20px rgba(0, 0, 0, 0.1);
    border: 2px solid #ffcd94;
}

.current-hanzi {
    font-size: 7rem;
    font-weight: 800;
    color: #d45a1f;
    text-shadow: 5px 5px 0 #ffdd99;
    letter-spacing: 8px;
    display: inline-block;
    word-break: break-word;
}

.input-area {
    margin: 12px 0 8px;
}

.pinyin-input {
    width: 90%;
    max-width: 280px;
    padding: 14px 18px;
    font-size: 1.5rem;
    font-family: 'Courier New', monospace;
    text-align: center;
    border: 4px solid #ffbc6e;
    border-radius: 60px;
    background: white;
    outline: none;
    color: #7c3f12;
    font-weight: bold;
    letter-spacing: 1px;
}

.pinyin-input:focus {
    border-color: #f39c12;
    box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.3);
    background: #fffbf0;
}

.reset-button-wrapper {
    margin: 5px 0 0;
    text-align: center;
}
.btn-reset {
    border: none;
    background: #ff8c5a;
    color: white;
    padding: 10px 28px;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: inherit;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.05s linear;
    box-shadow: 0 4px 0 #b6491a;
    transform: translateY(-2px);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-reset:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #b6491a;
}

.feedback {
    background: #fff0d0;
    margin-top: 15px;
    padding: 8px 12px;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: bold;
    color: #c75c1c;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
}
.feedback-error { color: #e84118; background: #ffe0db; }
.feedback-success { color: #2b7a3e; background: #e0ffe4; }
.feedback-gameover { background: #fedba0; color: #b6491a; font-size: 1.1rem; }

.keyboard-container {
    background: #f7e9d7;
    border-radius: 48px;
    padding: 16px 10px 20px;
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255,255,240,0.8);
    border: 1px solid #ffdeae;
    margin-top: 5px;
}

.keyboard-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: nowrap;
}

.key {
    background: #feefcf;
    border: none;
    border-radius: 16px;
    font-size: 1.7rem;
    font-weight: bold;
    font-family: 'Courier New', 'Segoe UI', monospace;
    color: #4d2f12;
    box-shadow: 0 3px 0 #b87a3a;
    cursor: pointer;
    transition: 0.05s linear;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-width: 40px;
    padding: 12px 0;
    text-align: center;
    touch-action: manipulation;
}

@media (max-width: 560px) {
    .key {
        font-size: 1.3rem;
        padding: 10px 0;
        border-radius: 12px;
        min-width: 36px;
    }
    .current-hanzi {
        font-size: 5rem;
    }
    .pinyin-input {
        font-size: 1.3rem;
        padding: 10px 12px;
    }
    .game-container {
        padding: 15px 15px 20px;
        border-radius: 50px 50px 40px 40px;
    }
    .score-box, .timer-box {
        font-size: 1rem;
        padding: 5px 10px;
    }
    .score-value, .timer-value {
        font-size: 1.4rem;
    }
}

@media (max-width: 450px) {
    .key {
        font-size: 1rem;
        padding: 8px 0;
        min-width: 30px;
    }
    .keyboard-row {
        gap: 4px;
    }
    .current-hanzi {
        font-size: 4rem;
    }
    .score-box, .timer-box {
        font-size: 0.9rem;
        padding: 4px 8px;
    }
    .score-value, .timer-value {
        font-size: 1.3rem;
    }
    .game-header {
        padding: 6px 8px;
    }
}

.key:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #b87a3a;
}

.key-func {
    background: #ffddb0;
    font-size: 1rem;
    text-transform: none;
    flex: 1.2;
    color: #a35112;
    font-weight: bold;
}

.key-delete {
    background: #ffbc7a;
    color: #7b3800;
}

.key-submit {
    background: #6fbf4c;
    color: white;
    flex: 3;
    font-size: 1.2rem;
    font-weight: bold;
    text-transform: none;
    letter-spacing: 2px;
    box-shadow: 0 3px 0 #3e7524;
}

.key-submit:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #3e7524;
}

.key-clear {
    background: #ffac6a;
}

.row-special {
    justify-content: space-evenly;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
    100% { transform: translateX(0); }
}
.shake-input {
    animation: shake 0.2s ease-in-out 0s 2;
}

<div class="game-full">

            </div>

        </div>

        <div class="hanzi-card">
            <div class="current-hanzi" id="currentHanzi">?</div>
        </div>

        <div class="input-area">

<div class="reset-button-wrapper" style="display: flex; justify-content: center; gap: 12px; margin-top: 10px;">

</div>
        <div class="feedback" id="feedbackArea">

    const TOTAL_QUESTIONS = 20;
    let currentGameQuestions = [];
    let currentIndex = 0;
    let gameActive = true;
    let gameCompleted = false;
    let timerSeconds = 0.0;
    let timerInterval = null;

    const currentHanziEl = document.getElementById('currentHanzi');
    const pinyinInput = document.getElementById('pinyinInput');
    const resetBtn = document.getElementById('resetBtn');
    const feedbackArea = document.getElementById('feedbackArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const timerDisplaySpan = document.getElementById('timerDisplay');

    function generateRandomQuestions() {
        const shuffled = [...WORD_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, TOTAL_QUESTIONS);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if (!gameCompleted && gameActive) {
                timerSeconds += 0.1;
                timerDisplaySpan.textContent = timerSeconds.toFixed(1);
            }
        }, 100);
    }

    function updateQuestionCounter() {
        questionCounterSpan.textContent = gameCompleted ? TOTAL_QUESTIONS : currentIndex;
    }

    function updateDisplayForCurrentQuestion() {
        if (currentGameQuestions && currentIndex < currentGameQuestions.length) {
            currentHanziEl.textContent = currentGameQuestions[currentIndex].word;
        } else {
            currentHanziEl.textContent = "？";
        }
        pinyinInput.disabled = gameCompleted;
        pinyinInput.value = '';
    }

    function setFeedback(msg, className = '') {
        feedbackArea.innerHTML = msg;
        feedbackArea.className = 'feedback';
        if (className) feedbackArea.classList.add(className);
    }

    // ---------- 新增：记录错别字函数 ----------
    function recordWrongWord(hanzi, wrongPinyin, correctPinyin) {
        // 从localStorage获取已有记录
        let wrongWords = JSON.parse(localStorage.getItem('wrongPinyinWords') || '[]');
        // 去重（避免重复记录同一错误）
        const isDuplicate = wrongWords.some(item => 
            item.hanzi === hanzi && item.wrongPinyin === wrongPinyin
        );
        if (!isDuplicate) {
            wrongWords.push({
                hanzi,
                wrongPinyin,
                correctPinyin,
                time: new Date().toLocaleString() // 记录时间
            });
            // 存回localStorage
            localStorage.setItem('wrongPinyinWords', JSON.stringify(wrongWords));
        }
    }

    // 修改showWrongMessage函数，添加记录逻辑
    function showWrongMessage(expectedPinyinStr, userInput) {
        setFeedback(`❌ “${userInput}” 不对哦！正确：${expectedPinyinStr}`, 'feedback-error');
        pinyinInput.classList.add('shake-input');
        setTimeout(() => pinyinInput.classList.remove('shake-input'), 400);
        // 新增：记录错别字
        const currentHanzi = currentGameQuestions[currentIndex].word;
        recordWrongWord(currentHanzi, userInput, expectedPinyinStr);
        // 答错也清空
        pinyinInput.value = '';
    }

    function handleCorrect() {
        const isLast = currentIndex + 1 === TOTAL_QUESTIONS;
        setFeedback(`✅ 正确！“${currentGameQuestions[currentIndex].word}”真棒！`, 'feedback-success');

        if (!isLast) {
            currentIndex++;
            pinyinInput.value = '';
            updateDisplayForCurrentQuestion();
            updateQuestionCounter();
            setFeedback(`🎈 下一题！还剩 ${TOTAL_QUESTIONS - currentIndex} 题`, 'feedback-success');
        } else {
            gameCompleted = true;
            gameActive = false;
            stopTimer();
            pinyinInput.disabled = true;
            setFeedback(`🏆 恭喜完成20题！用时 ${timerSeconds.toFixed(1)} 秒！🎉`, 'feedback-gameover');
            updateQuestionCounter();
        }
    }

    // 答案校验（支持多音字）
    function checkAnswer() {
        if (gameCompleted) {
            setFeedback("🏁 已完成！点重新开始挑战", 'feedback-error');
            return;
        }
        if (!gameActive) gameActive = true;
        if (currentIndex >= TOTAL_QUESTIONS) return;

        const item = currentGameQuestions[currentIndex];
        const user = pinyinInput.value.trim().toLowerCase().replace(/\s+/g, '');

        if (!user) {
            setFeedback("🐣 请输入拼音", 'feedback-error');
            return;
        }

        let correctList = Array.isArray(item.pinyin)
            ? item.pinyin.map(p => p.toLowerCase().trim())
            : [item.pinyin.toLowerCase().trim()];

        const isRight = correctList.includes(user);

        if (isRight) {
            handleCorrect();
        } else {
            const showPinyin = correctList.join(' 或 ');
            showWrongMessage(showPinyin, user);
        }
    }

    // ---------- 修复版键盘：输入顺序正常 ----------
    function buildRealKeyboard() {
        const container = document.getElementById('virtualKeyboardContainer');
        if (!container) return;
        container.innerHTML = '';

        const row1 = ['Q','W','E','R','T','Y','U','I','O','P'];
        const row2 = ['A','S','D','F','G','H','J','K','L'];
        const row3 = ['Z','X','C','V','B','N','M'];

        function createRow(keysArray) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'keyboard-row';
            keysArray.forEach(key => {
                const btn = document.createElement('button');
                btn.textContent = key;
                btn.className = 'key';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (gameCompleted) return;
                    pinyinInput.value += key.toLowerCase();
                    const len = pinyinInput.value.length;
                    pinyinInput.setSelectionRange(len, len);
                });
                rowDiv.appendChild(btn);
            });
            return rowDiv;
        }

        container.appendChild(createRow(row1));
        container.appendChild(createRow(row2));
        container.appendChild(createRow(row3));

        const funcRow = document.createElement('div');
        funcRow.className = 'keyboard-row row-special';

        // 删除
        const delBtn = document.createElement('button');
        delBtn.textContent = '⌫ 删除';
        delBtn.className = 'key key-func key-delete';
        delBtn.addEventListener('click', () => {
            if (gameCompleted) return;
            pinyinInput.value = pinyinInput.value.slice(0, -1);
        });

        // 提交
        const submitBtn = document.createElement('button');
        submitBtn.textContent = '✅ 提交';
        submitBtn.className = 'key key-submit';
        submitBtn.addEventListener('click', checkAnswer);

        // 清空
        const clearBtn = document.createElement('button');
        clearBtn.textContent = '🗑️ 清空';
        clearBtn.className = 'key key-func key-clear';
        clearBtn.addEventListener('click', () => {
            pinyinInput.value = '';
        });

        funcRow.appendChild(delBtn);
        funcRow.appendChild(submitBtn);
        funcRow.appendChild(clearBtn);
        container.appendChild(funcRow);
    }

// ---------- 重置游戏（优先从错题本出题） ----------
function resetAndNewGame() {
    stopTimer();
    gameCompleted = false;
    gameActive = true;
    timerSeconds = 0;
    timerDisplaySpan.textContent = "0.0";
    currentIndex = 0;

    // 读取错题本
    let wrongList = JSON.parse(localStorage.getItem('wrongPinyinWords') || '[]');
    
    // 去重：同一个字只出现一次
    let wrongWordMap = {};
    wrongList.forEach(item => {
        let found = WORD_BANK.find(w => w.word === item.hanzi);
        if (found) wrongWordMap[found.word] = found;
    });
    let wrongWords = Object.values(wrongWordMap);

    // 组题库：优先错题，不够再从总字库补满 20 题
    let gameWords = [];
    if (wrongWords.length > 0) {
        gameWords = [...wrongWords];
        // 从总字库随机补充
        let rest = [...WORD_BANK].filter(w => !gameWords.some(gw => gw.word === w.word));
        while (gameWords.length < TOTAL_QUESTIONS && rest.length > 0) {
            let rand = rest.splice(Math.floor(Math.random() * rest.length), 1)[0];
            gameWords.push(rand);
        }
    } else {
        // 无错题，随机出题
        let shuffled = [...WORD_BANK].sort(() => Math.random() - 0.5);
        gameWords = shuffled.slice(0, TOTAL_QUESTIONS);
    }

   // ✅ 关键：把 错题 + 普通字 全部打乱顺序
   gameWords = gameWords.sort(() => Math.random() - 0.5);

    currentGameQuestions = gameWords;
    updateDisplayForCurrentQuestion();
    updateQuestionCounter();
    setFeedback(wrongWords.length > 0 
        ? "✅ 当前优先练习错题本！" 
        : "🎉 新游戏开始！20题加油！", 
        'feedback-success'
    );
    startTimer();
    pinyinInput.focus();
}

    // 回车提交
    pinyinInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            checkAnswer();
        }
    });

    // 初始化
    function init() {
        buildRealKeyboard();
        resetBtn.addEventListener('click', resetAndNewGame);
        resetAndNewGame();
    }

    init();
</script>
