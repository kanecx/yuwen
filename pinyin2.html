<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼音小英雄 | 识字游戏 + 真实键盘布局 (空格提交)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免拖动，但输入框内仍可编辑 */
        }

        body {
            background: linear-gradient(145deg, #f9e7b3 0%, #f5c98e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            margin: 0;
            padding: 16px 12px 20px;
        }

        /* 整体游戏容器：采用列布局，键盘固定在底部样式 */
        .game-full {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            background: transparent;
        }

        /* 游戏主面板 (上方答题区) */
        .game-container {
            background: #fffef7;
            border-radius: 70px 70px 60px 60px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            padding: 20px 20px 30px;
            text-align: center;
            transition: all 0.2s ease;
        }

        /* 头部信息栏 */
        .game-header {
            display: flex;
            justify-content: space-between;
            background: #ffefc0;
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 4px 8px rgba(0,0,0,0.05);
        }

        .score-box, .timer-box {
            background: white;
            border-radius: 40px;
            padding: 5px 16px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: baseline;
            gap: 6px;
        }

        .score-box span:first-child, .timer-box span:first-child {
            font-size: 0.9rem;
            color: #b45f2b;
        }

        .score-value, .timer-value {
            font-size: 1.6rem;
            color: #e67e22;
            font-weight: bold;
            font-family: monospace;
        }

        /* 汉字大卡片 */
        .hanzi-card {
            background: #fff2df;
            border-radius: 65px;
            margin: 8px 0 15px;
            padding: 30px 15px;
            box-shadow: inset 0 0 0 5px white, 0 12px 20px rgba(0, 0, 0, 0.1);
            border: 2px solid #ffcd94;
        }

        .current-hanzi {
            font-size: 7rem;
            font-weight: 800;
            color: #d45a1f;
            text-shadow: 5px 5px 0 #ffdd99;
            letter-spacing: 8px;
            display: inline-block;
            word-break: break-word;
        }

        .hint-area {
            background: #ffe3b5;
            border-radius: 50px;
            padding: 6px 12px;
            margin: 5px 0 10px;
            font-size: 0.9rem;
            color: #b45a2b;
            display: inline-block;
        }

        .input-area {
            margin: 12px 0 12px;
        }

        .pinyin-input {
            width: 90%;
            max-width: 280px;
            padding: 14px 18px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            border: 4px solid #ffbc6e;
            border-radius: 60px;
            background: white;
            outline: none;
            color: #7c3f12;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .pinyin-input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.3);
            background: #fffbf0;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 10px 0 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #ffbc6e;
            color: #5a2e0e;
            padding: 10px 22px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #a05e1a;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a05e1a;
        }

        .btn-primary {
            background: #f3a712;
            color: #2d1b0c;
            box-shadow: 0 4px 0 #c16f1a;
        }

        .btn-reset {
            background: #ff8c5a;
            color: white;
            box-shadow: 0 4px 0 #b6491a;
        }

        .message {
            background: #fff0d0;
            margin-top: 15px;
            padding: 10px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #c75c1c;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .error-msg { color: #e84118; background: #ffe0db; }
        .success-msg { color: #2b7a3e; background: #e0ffe4; }
        .gameover-msg { background: #fedba0; color: #b6491a; font-size: 1.2rem; }

        .progress-info {
            margin-top: 8px;
            font-size: 0.85rem;
            background: #f2e2ca;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 40px;
            color: #8b4b1a;
        }

        /* ---------- 虚拟键盘区域 (真实布局，手机端适配) ---------- */
        .keyboard-container {
            background: #f7e9d7;
            border-radius: 48px;
            padding: 16px 10px 20px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255,255,240,0.8);
            border: 1px solid #ffdeae;
            margin-top: 5px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: nowrap;
        }

        .key {
            background: #feefcf;
            border: none;
            border-radius: 16px;
            font-size: 1.7rem;
            font-weight: bold;
            font-family: 'Courier New', 'Segoe UI', monospace;
            color: #4d2f12;
            box-shadow: 0 3px 0 #b87a3a;
            cursor: pointer;
            transition: 0.05s linear;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-width: 40px;
            padding: 12px 0;
            text-align: center;
            touch-action: manipulation;
        }

        /* 手机端适应调整大小 */
        @media (max-width: 560px) {
            .key {
                font-size: 1.3rem;
                padding: 10px 0;
                border-radius: 12px;
            }
            .current-hanzi {
                font-size: 5rem;
            }
            .pinyin-input {
                font-size: 1.3rem;
                padding: 10px 12px;
            }
            .game-container {
                padding: 15px 15px 20px;
            }
        }

        @media (max-width: 450px) {
            .key {
                font-size: 1rem;
                padding: 8px 0;
                min-width: 32px;
            }
            .keyboard-row {
                gap: 4px;
            }
        }

        .key:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b87a3a;
        }

        /* 功能键样式 */
        .key-func {
            background: #ffddb0;
            font-size: 1rem;
            text-transform: none;
            flex: 1.2;
            color: #a35112;
            font-weight: bold;
        }

        .key-delete {
            background: #ffbc7a;
            color: #7b3800;
        }

        /* 空格键改为提交样式，更醒目 */
        .key-submit {
            background: #6fbf4c;
            color: white;
            flex: 3;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: none;
            letter-spacing: 2px;
            box-shadow: 0 3px 0 #3e7524;
        }

        .key-submit:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #3e7524;
        }

        .key-clear {
            background: #ffac6a;
        }

        /* 适应大键盘最后一排特殊宽度 */
        .row-special {
            justify-content: space-evenly;
        }

        /* 震动动画 */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        .shake-input {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>
<body>
<div class="game-full">
    <!-- 主游戏区 -->
    <div class="game-container">
        <div class="game-header">
            <div class="score-box">
                <span>📖 进度</span>
                <span class="score-value" id="questionCounter">0</span>
                <span>/20</span>
            </div>
            <div class="timer-box">
                <span>⏱️ 用时</span>
                <span class="timer-value" id="timerDisplay">0.0</span>
                <span>秒</span>
            </div>
        </div>

        <div class="hanzi-card">
            <div class="current-hanzi" id="currentHanzi">?</div>
        </div>

        <div class="hint-area">
            🎤 点击下方键盘或直接打字 (自动转小写) | 空格键提交答案
        </div>

        <div class="input-area">
            <input type="text" id="pinyinInput" class="pinyin-input" placeholder="输入拼音..." autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none">
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="submitBtn">✔️ 检查答案</button>
            <button class="btn btn-reset" id="resetBtn">🔄 重新开始</button>
        </div>

        <div class="message" id="messageArea">
            🧸 输入拼音，答对20个汉字就胜利啦！
        </div>
        <div class="progress-info" id="extraInfo">⭐ 必须答对才能进入下一题 ⭐</div>
    </div>

    <!-- 虚拟键盘区域 (类似真实键盘布局，空格改为提交) -->
    <div class="keyboard-container" id="virtualKeyboardContainer">
        <!-- 动态生成键盘行: 三行字母 + 功能行（删除、提交、清空） -->
    </div>
</div>

<script>
    // ---------- 字库 (一年级常用字 + 小写拼音) ----------
    const WORD_BANK = [
        { word: "人", pinyin: "ren" }, { word: "口", pinyin: "kou" }, { word: "手", pinyin: "shou" },
        { word: "足", pinyin: "zu" }, { word: "日", pinyin: "ri" }, { word: "月", pinyin: "yue" },
        { word: "水", pinyin: "shui" }, { word: "火", pinyin: "huo" }, { word: "山", pinyin: "shan" },
        { word: "石", pinyin: "shi" }, { word: "田", pinyin: "tian" }, { word: "云", pinyin: "yun" },
        { word: "风", pinyin: "feng" }, { word: "雨", pinyin: "yu" }, { word: "电", pinyin: "dian" },
        { word: "木", pinyin: "mu" }, { word: "林", pinyin: "lin" }, { word: "天", pinyin: "tian" },
        { word: "地", pinyin: "di" }, { word: "妈", pinyin: "ma" }, { word: "爸", pinyin: "ba" },
        { word: "哥", pinyin: "ge" }, { word: "弟", pinyin: "di" }, { word: "花", pinyin: "hua" },
        { word: "草", pinyin: "cao" }, { word: "鸟", pinyin: "niao" }, { word: "鱼", pinyin: "yu" },
        { word: "虫", pinyin: "chong" }, { word: "马", pinyin: "ma" }, { word: "牛", pinyin: "niu" },
        { word: "羊", pinyin: "yang" }, { word: "米", pinyin: "mi" }, { word: "大", pinyin: "da" },
        { word: "小", pinyin: "xiao" }, { word: "多", pinyin: "duo" }, { word: "少", pinyin: "shao" },
        { word: "上", pinyin: "shang" }, { word: "下", pinyin: "xia" }, { word: "来", pinyin: "lai" },
        { word: "去", pinyin: "qu" }
    ];

    const TOTAL_QUESTIONS = 20;
    let currentGameQuestions = [];
    let currentIndex = 0;
    let gameActive = true;
    let gameCompleted = false;
    let timerSeconds = 0.0;
    let timerInterval = null;

    // DOM 元素
    const currentHanziEl = document.getElementById('currentHanzi');
    const pinyinInput = document.getElementById('pinyinInput');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const messageArea = document.getElementById('messageArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const extraInfoDiv = document.getElementById('extraInfo');

    // ---------- 游戏逻辑 ----------
    function generateRandomQuestions() {
        const shuffled = [...WORD_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, TOTAL_QUESTIONS);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if (!gameCompleted && gameActive) {
                timerSeconds += 0.1;
                timerDisplaySpan.textContent = timerSeconds.toFixed(1);
            }
        }, 100);
    }

    function updateQuestionCounter() {
        if (!gameCompleted) {
            questionCounterSpan.textContent = `${currentIndex}`;
        } else {
            questionCounterSpan.textContent = `${TOTAL_QUESTIONS}`;
        }
    }

    function updateDisplayForCurrentQuestion() {
        if (currentGameQuestions && currentIndex < currentGameQuestions.length) {
            currentHanziEl.textContent = currentGameQuestions[currentIndex].word;
        } else {
            currentHanziEl.textContent = "？";
        }
        if (!gameCompleted && gameActive) {
            pinyinInput.disabled = false;
            submitBtn.disabled = false;
        } else if (gameCompleted) {
            pinyinInput.disabled = true;
            submitBtn.disabled = true;
        }
        // 清空输入框，准备新输入
        if (pinyinInput) pinyinInput.value = '';
    }

    function setMessage(msg, className = '') {
        messageArea.innerHTML = msg;
        messageArea.className = 'message';
        if (className) {
            messageArea.classList.add(className);
        }
    }

    function showWrongMessage(expectedPinyin, userInput) {
        setMessage(`❌ 拼音“${userInput}”不正确！ 正确答案是“${expectedPinyin}”，再试试看～`, 'error-msg');
        pinyinInput.style.transform = 'shake 0.2s ease-in-out 0s 2';
        setTimeout(() => { pinyinInput.style.transform = ''; }, 400);
        pinyinInput.classList.add('shake-input');
        setTimeout(() => pinyinInput.classList.remove('shake-input'), 400);
        pinyinInput.focus();
    }

    function handleCorrect() {
        const isLast = (currentIndex + 1 === TOTAL_QUESTIONS);
        setMessage(`✅ 完全正确！ “${currentGameQuestions[currentIndex].word}” 拼音很棒！`, 'success-msg');

        if (!isLast) {
            currentIndex++;
            updateDisplayForCurrentQuestion();
            updateQuestionCounter();
            pinyinInput.value = '';
            pinyinInput.focus();
            setMessage(`🎈 进入下一题！ 还剩 ${TOTAL_QUESTIONS - currentIndex} 题`, 'success-msg');
            gameActive = true;
        } else {
            // 完成最后一题
            gameCompleted = true;
            gameActive = false;
            stopTimer();
            pinyinInput.disabled = true;
            submitBtn.disabled = true;
            const totalTime = timerSeconds.toFixed(1);
            setMessage(`🏆 恭喜你完成了全部20个汉字！ 🏆<br> ⏱️ 总用时 ${totalTime} 秒！ 你真是拼音小英雄！ 🎉`, 'gameover-msg');
            extraInfoDiv.innerHTML = '🎯 游戏通关！点击【重新开始】再玩一局 🎯';
            updateQuestionCounter();
            pinyinInput.blur();
        }
    }

    // 核心校验答案 (对外暴露)
    function checkAnswer() {
        if (gameCompleted) {
            setMessage("🏁 游戏已经完成啦！点击「重新开始」继续挑战吧", 'error-msg');
            return;
        }
        if (!gameActive && !gameCompleted) gameActive = true;
        if (currentIndex >= TOTAL_QUESTIONS) {
            if (!gameCompleted) {
                gameCompleted = true;
                stopTimer();
                setMessage("🎉 已完成所有题目！", 'gameover-msg');
                pinyinInput.disabled = true;
                submitBtn.disabled = true;
            }
            return;
        }

        const currentItem = currentGameQuestions[currentIndex];
        const correctPinyin = currentItem.pinyin.toLowerCase().trim();
        let userPinyin = pinyinInput.value.trim();
        // 转小写比较，支持键盘大写/混合大小写
        userPinyin = userPinyin.toLowerCase().replace(/\s/g, '');

        if (userPinyin === "") {
            setMessage("🐣 在框里输入拼音吧！试试看～", 'error-msg');
            pinyinInput.focus();
            return;
        }

        if (userPinyin === correctPinyin) {
            handleCorrect();
        } else {
            showWrongMessage(correctPinyin, userPinyin);
            pinyinInput.select();
        }
    }

    // ---------- 真实布局虚拟键盘 (三行字母 + 功能行：删除 / 提交(原空格) / 清空) ----------
    function buildRealKeyboard() {
        const container = document.getElementById('virtualKeyboardContainer');
        if (!container) return;
        container.innerHTML = ''; 

        // 键盘布局 (标准 QWERTY)
        const row1 = ['Q','W','E','R','T','Y','U','I','O','P'];
        const row2 = ['A','S','D','F','G','H','J','K','L'];
        const row3 = ['Z','X','C','V','B','N','M'];

        // 创建字母行函数
        function createRow(keysArray, rowClass = 'keyboard-row') {
            const rowDiv = document.createElement('div');
            rowDiv.className = rowClass;
            keysArray.forEach(key => {
                const btn = document.createElement('button');
                btn.textContent = key;
                btn.className = 'key';
                btn.setAttribute('data-letter', key);
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (gameCompleted) {
                        setMessage("游戏已完成，请重新开始再输入", 'error-msg');
                        return;
                    }
                    pinyinInput.focus();
                    const currentVal = pinyinInput.value;
                    const start = pinyinInput.selectionStart ?? currentVal.length;
                    const end = pinyinInput.selectionEnd ?? currentVal.length;
                    const newVal = currentVal.substring(0, start) + key + currentVal.substring(end);
                    pinyinInput.value = newVal;
                    const newPos = start + 1;
                    pinyinInput.setSelectionRange(newPos, newPos);
                    pinyinInput.dispatchEvent(new Event('input', { bubbles: true }));
                });
                rowDiv.appendChild(btn);
            });
            return rowDiv;
        }

        // 第一行
        container.appendChild(createRow(row1));
        // 第二行
        container.appendChild(createRow(row2));
        // 第三行
        container.appendChild(createRow(row3));

        // 功能键行: 删除键、提交键(原空格改为提交)、清空键
        const funcRow = document.createElement('div');
        funcRow.className = 'keyboard-row row-special';
        
        // 1. 删除键
        const delBtn = document.createElement('button');
        delBtn.textContent = '⌫ 删除';
        delBtn.className = 'key key-func key-delete';
        delBtn.addEventListener('click', () => {
            if (gameCompleted) return;
            pinyinInput.focus();
            const currentVal = pinyinInput.value;
            const start = pinyinInput.selectionStart ?? currentVal.length;
            const end = pinyinInput.selectionEnd ?? currentVal.length;
            if (start === end && start > 0) {
                const newVal = currentVal.substring(0, start - 1) + currentVal.substring(end);
                pinyinInput.value = newVal;
                const newPos = start - 1;
                pinyinInput.setSelectionRange(newPos, newPos);
            } else if (start !== end) {
                const newVal = currentVal.substring(0, start) + currentVal.substring(end);
                pinyinInput.value = newVal;
                pinyinInput.setSelectionRange(start, start);
            }
            pinyinInput.dispatchEvent(new Event('input', { bubbles: true }));
        });

        // 2. 提交键 (原来空格的位置，现改为“提交答案”)
        const submitKeyBtn = document.createElement('button');
        submitKeyBtn.textContent = '✅ 提交';
        submitKeyBtn.className = 'key key-submit';
        submitKeyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (gameCompleted) {
                setMessage("游戏已完成，请重新开始再提交", 'error-msg');
                return;
            }
            // 调用检查答案函数
            checkAnswer();
        });

        // 3. 清空键
        const clearBtn = document.createElement('button');
        clearBtn.textContent = '🗑️ 清空';
        clearBtn.className = 'key key-func key-clear';
        clearBtn.addEventListener('click', () => {
            if (gameCompleted) return;
            pinyinInput.value = '';
            pinyinInput.focus();
            pinyinInput.dispatchEvent(new Event('input', { bubbles: true }));
        });

        funcRow.appendChild(delBtn);
        funcRow.appendChild(submitKeyBtn);
        funcRow.appendChild(clearBtn);
        container.appendChild(funcRow);
        
        // 额外提示小文字（手机友好）
        const tip = document.createElement('div');
        tip.style.textAlign = 'center';
        tip.style.fontSize = '0.7rem';
        tip.style.marginTop = '12px';
        tip.style.color = '#b46f3a';
        tip.innerText = '💡 点按字母键输入，按【提交】或键盘空格键（虚拟）检查答案';
        container.appendChild(tip);
    }

    // ---------- 重置游戏 ----------
    function resetAndNewGame() {
        stopTimer();
        gameCompleted = false;
        gameActive = true;
        timerSeconds = 0.0;
        timerDisplaySpan.textContent = "0.0";
        currentGameQuestions = generateRandomQuestions();
        currentIndex = 0;
        updateDisplayForCurrentQuestion();
        updateQuestionCounter();
        pinyinInput.value = '';
        pinyinInput.disabled = false;
        submitBtn.disabled = false;
        setMessage("🎉 新的一局！一共20题，加油哟！", "success-msg");
        extraInfoDiv.innerHTML = '⭐ 必须答对才能进入下一题 ⭐';
        startTimer();
        pinyinInput.focus();
    }

    function onEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!gameCompleted && gameActive) {
                checkAnswer();
            } else if (gameCompleted) {
                setMessage("游戏已经完成，按「重新开始」继续游戏吧", 'error-msg');
            }
        }
    }

    // 实时将输入框内的大写字母自动转为小写（更友好）
    function setupInputTransform() {
        pinyinInput.addEventListener('input', function(e) {
            const raw = this.value;
            const lowerRaw = raw.toLowerCase();
            if (raw !== lowerRaw) {
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = lowerRaw;
                this.setSelectionRange(start, end);
            }
        });
    }

    // 初始化
    function init() {
        buildRealKeyboard();       // 真实布局键盘在下，空格改为提交按钮
        setupInputTransform();
        resetAndNewGame();
        submitBtn.addEventListener('click', () => {
            if (!gameCompleted && gameActive) checkAnswer();
            else if (gameCompleted) setMessage("🎮 游戏已完成，点击重新开始再玩一局", 'error-msg');
            else checkAnswer();
        });
        resetBtn.addEventListener('click', () => {
            resetAndNewGame();
        });
        pinyinInput.addEventListener('keypress', onEnterKey);
        // 移动端如果使用系统键盘，回车也会触发提交；无冲突
    }

    init();
</script>
</body>
</html>
