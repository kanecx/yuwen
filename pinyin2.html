<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼音小英雄 | 极简识字游戏</title>
    <style>
* {
    box-sizing: border-box;
    user-select: none; /* 避免拖动，输入框内仍可编辑 */
}

body {
    background: linear-gradient(145deg, #f9e7b3 0%, #f5c98e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
    margin: 0;
    padding: 16px 12px 20px;
}

/* 整体游戏容器：列布局，键盘自然置于底部 */
.game-full {
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: transparent;
}

/* 游戏主面板 (答题区) */
.game-container {
    background: #fffef7;
    border-radius: 70px 70px 60px 60px;
    box-shadow: 0 20px 30px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
    padding: 20px 20px 30px;
    text-align: center;
    transition: all 0.2s ease;
}

/* 头部信息栏：核心修复，改用flex布局保证不挤 */
.game-header {
    display: flex;
    justify-content: space-around; /* 替换space-between，小屏更稳 */
    background: #ffefc0;
    padding: 8px 12px;
    border-radius: 60px;
    margin-bottom: 20px;
    flex-wrap: nowrap; /* 强制不换行，避免上下错位 */
    gap: 8px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05), 0 4px 8px rgba(0,0,0,0.05);
}

.score-box, .timer-box {
    background: white;
    border-radius: 40px;
    padding: 6px 14px;
    font-weight: bold;
    font-size: 1.1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    display: flex; /* 替换inline-flex，保证布局稳定 */
    align-items: baseline;
    gap: 4px;
    flex: 1; /* 两个盒子平分宽度，避免一宽一窄 */
    justify-content: center; /* 内容居中，更美观 */
    white-space: nowrap; /* 强制不换行，彻底解决文字错位 */
}

.score-box span:first-child, .timer-box span:first-child {
    font-size: 0.85rem;
    color: #b45f2b;
}

.score-value, .timer-value {
    font-size: 1.5rem;
    color: #e67e22;
    font-weight: bold;
    font-family: monospace;
}

/* 汉字大卡片 */
.hanzi-card {
    background: #fff2df;
    border-radius: 65px;
    margin: 8px 0 15px;
    padding: 30px 15px;
    box-shadow: inset 0 0 0 5px white, 0 12px 20px rgba(0, 0, 0, 0.1);
    border: 2px solid #ffcd94;
}

.current-hanzi {
    font-size: 7rem;
    font-weight: 800;
    color: #d45a1f;
    text-shadow: 5px 5px 0 #ffdd99;
    letter-spacing: 8px;
    display: inline-block;
    word-break: break-word;
}

.hint-area {
    background: #ffe3b5;
    border-radius: 50px;
    padding: 6px 12px;
    margin: 5px 0 10px;
    font-size: 0.9rem;
    color: #b45a2b;
    display: inline-block;
}

.input-area {
    margin: 12px 0 8px;
}

.pinyin-input {
    width: 90%;
    max-width: 280px;
    padding: 14px 18px;
    font-size: 1.5rem;
    font-family: 'Courier New', monospace;
    text-align: center;
    border: 4px solid #ffbc6e;
    border-radius: 60px;
    background: white;
    outline: none;
    color: #7c3f12;
    font-weight: bold;
    letter-spacing: 1px;
}

.pinyin-input:focus {
    border-color: #f39c12;
    box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.3);
    background: #fffbf0;
}

/* 只保留重新开始按钮（独立干净） */
.reset-button-wrapper {
    margin: 5px 0 0;
    text-align: center;
}
.btn-reset {
    border: none;
    background: #ff8c5a;
    color: white;
    padding: 10px 28px;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: inherit;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.05s linear;
    box-shadow: 0 4px 0 #b6491a;
    transform: translateY(-2px);
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-reset:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #b6491a;
}

/* 简洁反馈消息区域 (取代之前的message, 但保持必要提示) */
.feedback {
    background: #fff0d0;
    margin-top: 15px;
    padding: 8px 12px;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: bold;
    color: #c75c1c;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
}
.feedback-error { color: #e84118; background: #ffe0db; }
.feedback-success { color: #2b7a3e; background: #e0ffe4; }
.feedback-gameover { background: #fedba0; color: #b6491a; font-size: 1.1rem; }

/* 虚拟键盘区域 (真实布局，手机端适配) */
.keyboard-container {
    background: #f7e9d7;
    border-radius: 48px;
    padding: 16px 10px 20px;
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255,255,240,0.8);
    border: 1px solid #ffdeae;
    margin-top: 5px;
}

.keyboard-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: nowrap;
}

.key {
    background: #feefcf;
    border: none;
    border-radius: 16px;
    font-size: 1.7rem;
    font-weight: bold;
    font-family: 'Courier New', 'Segoe UI', monospace;
    color: #4d2f12;
    box-shadow: 0 3px 0 #b87a3a;
    cursor: pointer;
    transition: 0.05s linear;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-width: 40px;
    padding: 12px 0;
    text-align: center;
    touch-action: manipulation;
}

/* 手机端适应：极致适配小屏 */
@media (max-width: 560px) {
    .key {
        font-size: 1.3rem;
        padding: 10px 0;
        border-radius: 12px;
        min-width: 36px;
    }
    .current-hanzi {
        font-size: 5rem;
    }
    .pinyin-input {
        font-size: 1.3rem;
        padding: 10px 12px;
    }
    .game-container {
        padding: 15px 15px 20px;
        border-radius: 50px 50px 40px 40px;
    }
    .score-box, .timer-box {
        font-size: 1rem;
        padding: 5px 10px;
    }
    .score-value, .timer-value {
        font-size: 1.4rem;
    }
}

@media (max-width: 450px) {
    .key {
        font-size: 1rem;
        padding: 8px 0;
        min-width: 30px;
    }
    .keyboard-row {
        gap: 4px;
    }
    .current-hanzi {
        font-size: 4rem;
    }
    .score-box, .timer-box {
        font-size: 0.9rem;
        padding: 4px 8px;
    }
    .score-value, .timer-value {
        font-size: 1.3rem;
    }
    .game-header {
        padding: 6px 8px;
    }
}

.key:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #b87a3a;
}

/* 功能键样式 */
.key-func {
    background: #ffddb0;
    font-size: 1rem;
    text-transform: none;
    flex: 1.2;
    color: #a35112;
    font-weight: bold;
}

.key-delete {
    background: #ffbc7a;
    color: #7b3800;
}

/* 提交键醒目 */
.key-submit {
    background: #6fbf4c;
    color: white;
    flex: 3;
    font-size: 1.2rem;
    font-weight: bold;
    text-transform: none;
    letter-spacing: 2px;
    box-shadow: 0 3px 0 #3e7524;
}

.key-submit:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #3e7524;
}

.key-clear {
    background: #ffac6a;
}

.row-special {
    justify-content: space-evenly;
}

/* 震动动画 */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
    100% { transform: translateX(0); }
}
.shake-input {
    animation: shake 0.2s ease-in-out 0s 2;
}
    </style>
</head>
<body>
<div class="game-full">
    <!-- 主游戏区 -->
    <div class="game-container">
        <div class="game-header">
            <div class="score-box">
                <span>📖 进度</span>
                <span class="score-value" id="questionCounter">0</span>
                <span>/20</span>
            </div>
            <div class="timer-box">
                <span>⏱️ 用时</span>
                <span class="timer-value" id="timerDisplay">0.0</span>
                <span>秒</span>
            </div>
        </div>

        <div class="hanzi-card">
            <div class="current-hanzi" id="currentHanzi">?</div>
        </div>



        <div class="input-area">
            <input type="text" id="pinyinInput" class="pinyin-input" placeholder="输入拼音..." autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="none">
        </div>
    <!-- 虚拟键盘区域 (真实布局，空格键为提交) -->
    <div class="keyboard-container" id="virtualKeyboardContainer"></div>
        <!-- 仅保留重新开始按钮，简洁 -->
        <div class="reset-button-wrapper">
            <button class="btn-reset" id="resetBtn">🔄 重新开始</button>
        </div>

        <!-- 反馈消息区域（代替原来的message区域，但风格精简） -->
        <div class="feedback" id="feedbackArea">
            ✨ 输入拼音，答对20题获胜
        </div>
    </div>


</div>

<script>
    // ---------- 字库 (一年级常用字 + 小写拼音) ----------
    const WORD_BANK = [
        { word: "人", pinyin: "ren" }, { word: "口", pinyin: "kou" }, { word: "手", pinyin: "shou" },
        { word: "足", pinyin: "zu" }, { word: "日", pinyin: "ri" }, { word: "月", pinyin: "yue" },
        { word: "水", pinyin: "shui" }, { word: "火", pinyin: "huo" }, { word: "山", pinyin: "shan" },
        { word: "石", pinyin: "shi" }, { word: "田", pinyin: "tian" }, { word: "云", pinyin: "yun" },
        { word: "风", pinyin: "feng" }, { word: "雨", pinyin: "yu" }, { word: "电", pinyin: "dian" },
        { word: "木", pinyin: "mu" }, { word: "林", pinyin: "lin" }, { word: "天", pinyin: "tian" },
        { word: "地", pinyin: "di" }, { word: "妈", pinyin: "ma" }, { word: "爸", pinyin: "ba" },
        { word: "哥", pinyin: "ge" }, { word: "弟", pinyin: "di" }, { word: "花", pinyin: "hua" },
        { word: "草", pinyin: "cao" }, { word: "鸟", pinyin: "niao" }, { word: "鱼", pinyin: "yu" },
        { word: "虫", pinyin: "chong" }, { word: "马", pinyin: "ma" }, { word: "牛", pinyin: "niu" },
        { word: "羊", pinyin: "yang" }, { word: "米", pinyin: "mi" }, { word: "大", pinyin: "da" },
        { word: "小", pinyin: "xiao" }, { word: "多", pinyin: "duo" }, { word: "少", pinyin: "shao" },
        { word: "上", pinyin: "shang" }, { word: "下", pinyin: "xia" }, { word: "来", pinyin: "lai" },
        { word: "去", pinyin: "qu" }
    ];

    const TOTAL_QUESTIONS = 20;
    let currentGameQuestions = [];
    let currentIndex = 0;
    let gameActive = true;
    let gameCompleted = false;
    let timerSeconds = 0.0;
    let timerInterval = null;

    // DOM 元素
    const currentHanziEl = document.getElementById('currentHanzi');
    const pinyinInput = document.getElementById('pinyinInput');
    const resetBtn = document.getElementById('resetBtn');
    const feedbackArea = document.getElementById('feedbackArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const timerDisplaySpan = document.getElementById('timerDisplay');

    // ---------- 游戏逻辑 ----------
    function generateRandomQuestions() {
        const shuffled = [...WORD_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, TOTAL_QUESTIONS);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if (timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if (!gameCompleted && gameActive) {
                timerSeconds += 0.1;
                timerDisplaySpan.textContent = timerSeconds.toFixed(1);
            }
        }, 100);
    }

    function updateQuestionCounter() {
        if (!gameCompleted) {
            questionCounterSpan.textContent = `${currentIndex}`;
        } else {
            questionCounterSpan.textContent = `${TOTAL_QUESTIONS}`;
        }
    }

    function updateDisplayForCurrentQuestion() {
        if (currentGameQuestions && currentIndex < currentGameQuestions.length) {
            currentHanziEl.textContent = currentGameQuestions[currentIndex].word;
        } else {
            currentHanziEl.textContent = "？";
        }
        if (!gameCompleted && gameActive) {
            pinyinInput.disabled = false;
        } else if (gameCompleted) {
            pinyinInput.disabled = true;
        }
        if (pinyinInput) pinyinInput.value = '';
    }

    function setFeedback(msg, className = '') {
        feedbackArea.innerHTML = msg;
        feedbackArea.className = 'feedback';
        if (className) {
            feedbackArea.classList.add(className);
        }
    }

    function showWrongMessage(expectedPinyin, userInput) {
        setFeedback(`❌ “${userInput}” 不对哦！ 正确答案是“${expectedPinyin}”，再试试～`, 'feedback-error');
        pinyinInput.style.transform = 'shake 0.2s ease-in-out 0s 2';
        setTimeout(() => { pinyinInput.style.transform = ''; }, 400);
        pinyinInput.classList.add('shake-input');
        setTimeout(() => pinyinInput.classList.remove('shake-input'), 400);
        pinyinInput.focus();
    }

    function handleCorrect() {
        const isLast = (currentIndex + 1 === TOTAL_QUESTIONS);
        setFeedback(`✅ 完全正确！ “${currentGameQuestions[currentIndex].word}” 拼音很棒！`, 'feedback-success');

        if (!isLast) {
            currentIndex++;
            updateDisplayForCurrentQuestion();
            updateQuestionCounter();
            pinyinInput.value = '';
            pinyinInput.focus();
            setFeedback(`🎈 进入下一题！ 还剩 ${TOTAL_QUESTIONS - currentIndex} 题`, 'feedback-success');
            gameActive = true;
        } else {
            // 完成最后一题
            gameCompleted = true;
            gameActive = false;
            stopTimer();
            pinyinInput.disabled = true;
            const totalTime = timerSeconds.toFixed(1);
            setFeedback(`🏆 恭喜你完成全部20个汉字！ 🏆 总用时 ${totalTime} 秒！ 你真是拼音小英雄！ 🎉`, 'feedback-gameover');
            updateQuestionCounter();
            pinyinInput.blur();
        }
    }

    // 核心校验答案
    function checkAnswer() {
        if (gameCompleted) {
            setFeedback("🏁 游戏已完成！点击「重新开始」继续挑战", 'feedback-error');
            return;
        }
        if (!gameActive && !gameCompleted) gameActive = true;
        if (currentIndex >= TOTAL_QUESTIONS) {
            if (!gameCompleted) {
                gameCompleted = true;
                stopTimer();
                setFeedback("🎉 已完成所有题目！", 'feedback-gameover');
                pinyinInput.disabled = true;
            }
            return;
        }

        const currentItem = currentGameQuestions[currentIndex];
        const correctPinyin = currentItem.pinyin.toLowerCase().trim();
        let userPinyin = pinyinInput.value.trim();
        userPinyin = userPinyin.toLowerCase().replace(/\s/g, '');

        if (userPinyin === "") {
            setFeedback("🐣 在框里输入拼音吧！试试看～", 'feedback-error');
            pinyinInput.focus();
            return;
        }

        if (userPinyin === correctPinyin) {
            handleCorrect();
        } else {
            showWrongMessage(correctPinyin, userPinyin);
            pinyinInput.select();
        }
    }

    // ---------- 真实布局虚拟键盘 (字母行 + 删除/提交/清空) ----------
    function buildRealKeyboard() {
        const container = document.getElementById('virtualKeyboardContainer');
        if (!container) return;
        container.innerHTML = ''; 

        // QWERTY 布局
        const row1 = ['Q','W','E','R','T','Y','U','I','O','P'];
        const row2 = ['A','S','D','F','G','H','J','K','L'];
        const row3 = ['Z','X','C','V','B','N','M'];

        function createRow(keysArray) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'keyboard-row';
            keysArray.forEach(key => {
                const btn = document.createElement('button');
                btn.textContent = key;
                btn.className = 'key';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (gameCompleted) {
                        setFeedback("游戏已完成，重新开始后再输入吧", 'feedback-error');
                        return;
                    }
                    pinyinInput.focus();
                    const currentVal = pinyinInput.value;
                    const start = pinyinInput.selectionStart ?? currentVal.length;
                    const end = pinyinInput.selectionEnd ?? currentVal.length;
                    const newVal = currentVal.substring(0, start) + key + currentVal.substring(end);
                    pinyinInput.value = newVal;
                    const newPos = start + 1;
                    pinyinInput.setSelectionRange(newPos, newPos);
                    pinyinInput.dispatchEvent(new Event('input', { bubbles: true }));
                });
                rowDiv.appendChild(btn);
            });
            return rowDiv;
        }

        container.appendChild(createRow(row1));
        container.appendChild(createRow(row2));
        container.appendChild(createRow(row3));

        // 功能键行: 删除、提交、清空
        const funcRow = document.createElement('div');
        funcRow.className = 'keyboard-row row-special';
        
        const delBtn = document.createElement('button');
        delBtn.textContent = '⌫ 删除';
        delBtn.className = 'key key-func key-delete';
        delBtn.addEventListener('click', () => {
            if (gameCompleted) return;
            pinyinInput.focus();
            const currentVal = pinyinInput.value;
            const start = pinyinInput.selectionStart ?? currentVal.length;
            const end = pinyinInput.selectionEnd ?? currentVal.length;
            if (start === end && start > 0) {
                const newVal = currentVal.substring(0, start - 1) + currentVal.substring(end);
                pinyinInput.value = newVal;
                const newPos = start - 1;
                pinyinInput.setSelectionRange(newPos, newPos);
            } else if (start !== end) {
                const newVal = currentVal.substring(0, start) + currentVal.substring(end);
                pinyinInput.value = newVal;
                pinyinInput.setSelectionRange(start, start);
            }
            pinyinInput.dispatchEvent(new Event('input', { bubbles: true }));
        });

        const submitKeyBtn = document.createElement('button');
        submitKeyBtn.textContent = '✅ 提交';
        submitKeyBtn.className = 'key key-submit';
        submitKeyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (gameCompleted) {
                setFeedback("游戏已完成，请重新开始", 'feedback-error');
                return;
            }
            checkAnswer();
        });

        const clearBtn = document.createElement('button');
        clearBtn.textContent = '🗑️ 清空';
        clearBtn.className = 'key key-func key-clear';
        clearBtn.addEventListener('click', () => {
            if (gameCompleted) return;
            pinyinInput.value = '';
            pinyinInput.focus();
            pinyinInput.dispatchEvent(new Event('input', { bubbles: true }));
        });

        funcRow.appendChild(delBtn);
        funcRow.appendChild(submitKeyBtn);
        funcRow.appendChild(clearBtn);
        container.appendChild(funcRow);
        
        const tip = document.createElement('div');
        tip.style.textAlign = 'center';
        tip.style.fontSize = '0.7rem';
        tip.style.marginTop = '12px';
        tip.style.color = '#b46f3a';
        tip.innerText = '💡 点按字母键，按【提交】或键盘回车键检查答案';
        container.appendChild(tip);
    }

    // ---------- 重置游戏 ----------
    function resetAndNewGame() {
        stopTimer();
        gameCompleted = false;
        gameActive = true;
        timerSeconds = 0.0;
        timerDisplaySpan.textContent = "0.0";
        currentGameQuestions = generateRandomQuestions();
        currentIndex = 0;
        updateDisplayForCurrentQuestion();
        updateQuestionCounter();
        pinyinInput.value = '';
        pinyinInput.disabled = false;
        setFeedback("🎉 新的一局！一共20题，加油哟！", 'feedback-success');
        startTimer();
        pinyinInput.focus();
    }

    function onEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!gameCompleted && gameActive) {
                checkAnswer();
            } else if (gameCompleted) {
                setFeedback("游戏已完成，点「重新开始」继续游戏吧", 'feedback-error');
            }
        }
    }

    // 实时将输入框内大写自动转小写
    function setupInputTransform() {
        pinyinInput.addEventListener('input', function(e) {
            const raw = this.value;
            const lowerRaw = raw.toLowerCase();
            if (raw !== lowerRaw) {
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = lowerRaw;
                this.setSelectionRange(start, end);
            }
        });
    }

    // 初始化
    function init() {
        buildRealKeyboard();       // 真实布局键盘，提交键醒目
        setupInputTransform();
        resetAndNewGame();
        resetBtn.addEventListener('click', () => {
            resetAndNewGame();
        });
        pinyinInput.addEventListener('keypress', onEnterKey);
        // 移动端适配：若点击重置后保证焦点
        pinyinInput.addEventListener('touchstart', () => {});
    }

    init();
</script>
</body>
</html>
